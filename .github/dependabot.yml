# Dependabot — keeps both packages and the Actions pins patched via reviewed
# PRs. The security-audit workflow reports current vulnerability state on
# every PR; the fixes land through these updates, each gated by full CI.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/compliance-firewall-agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Tailwind 4 is a ground-up rework (PostCSS plugin moved to
      # @tailwindcss/postcss, config-in-CSS); the app is built on the v3
      # config. The v4 bump (#201) broke every `next build`. Majors here are a
      # deliberate migration, not a routine bump.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/proxy"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
