name: Security Audit

# Report-only dependency audit for production dependencies in both packages.
# Both packages currently carry known advisories, so this job surfaces the
# state as a WARNING ANNOTATION on every PR without failing the check —
# a red X here would read as broken CI while the signal is "known baseline".
# Remediation lands through Dependabot PRs (see .github/dependabot.yml),
# each gated by full CI. Once the baseline is clean, drop the `if !` wrapper
# to make this a hard gate.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  audit:
    name: npm audit (prod deps)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [compliance-firewall-agent, proxy]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit production dependencies (high+)
        run: |
          if ! npm audit --omit=dev --audit-level=high; then
            echo "::warning title=npm audit (${{ matrix.package }})::High-severity advisories present in production dependencies — full report in this job's log. Fixes arrive via Dependabot PRs."
          fi
