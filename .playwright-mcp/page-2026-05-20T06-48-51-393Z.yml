    - generic [ref=e459]:
      - heading "Frequently asked" [level=2] [ref=e460]
      - generic [ref=e461]:
        - generic [ref=e462]:
          - button "Does prompt content ever leave my network?" [ref=e463] [cursor=pointer]:
            - generic [ref=e464]: Does prompt content ever leave my network?
            - img [ref=e466]
          - paragraph [ref=e467]: No. HoundShield runs entirely on your infrastructure. The scanning engine, detection patterns, and audit logs all stay local. Only a license key hash and prompt count (no content) go external for billing.
        - generic [ref=e468]:
          - button "How long does setup take?" [ref=e469] [cursor=pointer]:
            - generic [ref=e470]: How long does setup take?
            - img [ref=e472]
          - paragraph [ref=e473]: Under 10 minutes for most organizations. Change one environment variable to point AI tools at your HoundShield endpoint. Docker deployment is 3 commands. No agents, no firewall rules, no code changes.
        - generic [ref=e474]:
          - button "Which AI tools does HoundShield support?" [ref=e475] [cursor=pointer]:
            - generic [ref=e476]: Which AI tools does HoundShield support?
            - img [ref=e478]
          - paragraph [ref=e479]: "Any tool using an OpenAI-compatible API: ChatGPT, Copilot, Claude, Gemini, Cursor, Codeium, and open-source models. It operates at the network layer, so it's model-agnostic."
        - generic [ref=e480]:
          - button "Is HoundShield CMMC Level 2 compliant?" [ref=e481] [cursor=pointer]:
            - generic [ref=e482]: Is HoundShield CMMC Level 2 compliant?
            - img [ref=e484]
          - paragraph [ref=e485]: HoundShield maps all 110 NIST 800-171 Rev 2 controls and generates C3PAO-ready PDF evidence. Because it's local-only, CUI never crosses your control boundary — satisfying NIST 3.13.1 and supporting CMMC Level 2 certification.
        - generic [ref=e486]:
          - button "What happens when a violation is detected?" [ref=e487] [cursor=pointer]:
            - generic [ref=e488]: What happens when a violation is detected?
            - img [ref=e490]
          - paragraph [ref=e491]: The prompt is blocked and the user receives a policy violation message. A tamper-proof, SHA-256 signed log entry is created with the timestamp, matched pattern, and affected framework. Webhook notifications are available on Pro and above.
        - generic [ref=e492]:
          - button "Can I export audit reports for my assessor?" [ref=e493] [cursor=pointer]:
            - generic [ref=e494]: Can I export audit reports for my assessor?
            - img [ref=e496]
          - paragraph [ref=e497]: Yes. Pro and above plans support one-click PDF export of compliance evidence. Reports are formatted for C3PAO assessors and include control coverage maps, scan statistics, and violation records.
